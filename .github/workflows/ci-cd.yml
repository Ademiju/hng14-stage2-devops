name: ci-cd

on:
  push:
    branches:
      - "**"
  pull_request:

env:
  REGISTRY_HOST: localhost:5000
  API_REPO: localhost:5000/job-processing-api
  WORKER_REPO: localhost:5000/job-processing-worker
  FRONTEND_REPO: localhost:5000/job-processing-frontend

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          npm install --prefix frontend

      - name: Lint Python
        run: flake8 api worker

      - name: Lint JavaScript
        run: npm run --prefix frontend lint

      - name: Lint Dockerfiles
        run: |
          for file in api/Dockerfile worker/Dockerfile frontend/Dockerfile; do
            docker run --rm -i hadolint/hadolint < "$file"
          done

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r api/requirements.txt pytest pytest-cov httpx

      - name: Run API unit tests with coverage
        run: |
          pytest api/tests \
            --cov=api \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage-report
          path: coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v4

      - name: Wait for local registry
        run: |
          for attempt in {1..30}; do
            if curl -fsS "http://${REGISTRY_HOST}/v2/" >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Local registry did not become ready in time" >&2
          exit 1

      - name: Build and push images to local registry
        env:
          GIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          docker build -t "${API_REPO}:${GIT_SHA}" -t "${API_REPO}:latest" api
          docker build -t "${WORKER_REPO}:${GIT_SHA}" -t "${WORKER_REPO}:latest" worker
          docker build -t "${FRONTEND_REPO}:${GIT_SHA}" -t "${FRONTEND_REPO}:latest" frontend

          docker push "${API_REPO}:${GIT_SHA}"
          docker push "${API_REPO}:latest"
          docker push "${WORKER_REPO}:${GIT_SHA}"
          docker push "${WORKER_REPO}:latest"
          docker push "${FRONTEND_REPO}:${GIT_SHA}"
          docker push "${FRONTEND_REPO}:latest"

      - name: Export image archives
        env:
          GIT_SHA: ${{ github.sha }}
        run: |
          mkdir -p image-artifacts
          docker save "${API_REPO}:${GIT_SHA}" -o image-artifacts/api-image.tar
          docker save "${WORKER_REPO}:${GIT_SHA}" -o image-artifacts/worker-image.tar
          docker save "${FRONTEND_REPO}:${GIT_SHA}" -o image-artifacts/frontend-image.tar

      - name: Upload image archives
        uses: actions/upload-artifact@v4
        with:
          name: built-images
          path: image-artifacts/*.tar

  security_scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download built images
        uses: actions/download-artifact@v4
        with:
          name: built-images
          path: image-artifacts

      - name: Scan images with Trivy
        run: |
          set +e
          mkdir -p trivy-results
          status=0

          docker run --rm \
            -v "${PWD}:/workspace" \
            aquasec/trivy:0.62.1 image --input /workspace/image-artifacts/api-image.tar \
            --severity CRITICAL --exit-code 1 --format sarif --output /workspace/trivy-results/api.sarif
          rc=$?
          if [ "$rc" -ne 0 ]; then
            status=$rc
          fi

          docker run --rm \
            -v "${PWD}:/workspace" \
            aquasec/trivy:0.62.1 image --input /workspace/image-artifacts/worker-image.tar \
            --severity CRITICAL --exit-code 1 --format sarif --output /workspace/trivy-results/worker.sarif
          rc=$?
          if [ "$rc" -ne 0 ]; then
            status=$rc
          fi

          docker run --rm \
            -v "${PWD}:/workspace" \
            aquasec/trivy:0.62.1 image --input /workspace/image-artifacts/frontend-image.tar \
            --severity CRITICAL --exit-code 1 --format sarif --output /workspace/trivy-results/frontend.sarif
          rc=$?
          if [ "$rc" -ne 0 ]; then
            status=$rc
          fi

          exit "$status"

      - name: Upload Trivy SARIF artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif-results
          path: trivy-results/*.sarif

  integration_test:
    runs-on: ubuntu-latest
    needs: security_scan
    steps:
      - uses: actions/checkout@v4

      - name: Download built images
        uses: actions/download-artifact@v4
        with:
          name: built-images
          path: image-artifacts

      - name: Load built images
        run: |
          docker load -i image-artifacts/api-image.tar
          docker load -i image-artifacts/worker-image.tar
          docker load -i image-artifacts/frontend-image.tar

      - name: Create CI environment file
        env:
          GIT_SHA: ${{ github.sha }}
        run: |
          cat <<EOF > .env.ci
          RESTART_POLICY=unless-stopped
          INTERNAL_NETWORK_NAME=job-processing-ci
          JOB_QUEUE=jobs
          REDIS_IMAGE=redis:7-alpine
          REDIS_APPENDONLY=yes
          REDIS_PASSWORD=ci-password
          REDIS_VOLUME_NAME=job-processing-ci-redis-data
          REDIS_CPUS=0.50
          REDIS_MEMORY=256m
          REDIS_HEALTHCHECK_INTERVAL=5s
          REDIS_HEALTHCHECK_TIMEOUT=3s
          REDIS_HEALTHCHECK_RETRIES=10
          REDIS_HEALTHCHECK_START_PERIOD=5s
          API_IMAGE=${API_REPO}:${GIT_SHA}
          API_BUILD_CONTEXT=./api
          API_DOCKERFILE=Dockerfile
          API_REDIS_HOST=redis
          API_REDIS_PORT=6379
          API_HOST_PORT=8000
          API_CONTAINER_PORT=8000
          API_HEALTHCHECK_PATH=/health
          API_CPUS=1.00
          API_MEMORY=512m
          API_HEALTHCHECK_INTERVAL=5s
          API_HEALTHCHECK_TIMEOUT=3s
          API_HEALTHCHECK_RETRIES=12
          API_HEALTHCHECK_START_PERIOD=5s
          WORKER_IMAGE=${WORKER_REPO}:${GIT_SHA}
          WORKER_BUILD_CONTEXT=./worker
          WORKER_DOCKERFILE=Dockerfile
          WORKER_REDIS_HOST=redis
          WORKER_REDIS_PORT=6379
          WORKER_POLL_TIMEOUT=1
          WORKER_JOB_DURATION_SECONDS=1
          WORKER_CPUS=1.00
          WORKER_MEMORY=512m
          WORKER_HEALTHCHECK_INTERVAL=5s
          WORKER_HEALTHCHECK_TIMEOUT=3s
          WORKER_HEALTHCHECK_RETRIES=12
          WORKER_HEALTHCHECK_START_PERIOD=5s
          FRONTEND_IMAGE=${FRONTEND_REPO}:${GIT_SHA}
          FRONTEND_BUILD_CONTEXT=./frontend
          FRONTEND_DOCKERFILE=Dockerfile
          FRONTEND_API_URL=http://api:8000
          FRONTEND_HOST=0.0.0.0
          FRONTEND_HOST_PORT=3000
          FRONTEND_CONTAINER_PORT=3000
          FRONTEND_HEALTHCHECK_PATH=/health
          FRONTEND_CPUS=0.75
          FRONTEND_MEMORY=384m
          FRONTEND_HEALTHCHECK_INTERVAL=5s
          FRONTEND_HEALTHCHECK_TIMEOUT=3s
          FRONTEND_HEALTHCHECK_RETRIES=12
          FRONTEND_HEALTHCHECK_START_PERIOD=5s
          EOF

      - name: Run full-stack integration test
        env:
          FRONTEND_HOST_PORT: "3000"
        run: bash scripts/integration_test.sh

  deploy:
    runs-on: ubuntu-latest
    needs: integration_test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Download built images
        uses: actions/download-artifact@v4
        with:
          name: built-images
          path: image-artifacts

      - name: Load built images
        run: |
          docker load -i image-artifacts/api-image.tar
          docker load -i image-artifacts/worker-image.tar
          docker load -i image-artifacts/frontend-image.tar

      - name: Prepare latest tags for rolling deployment
        env:
          GIT_SHA: ${{ github.sha }}
        run: |
          docker tag "${API_REPO}:${GIT_SHA}" "${API_REPO}:latest"
          docker tag "${WORKER_REPO}:${GIT_SHA}" "${WORKER_REPO}:latest"
          docker tag "${FRONTEND_REPO}:${GIT_SHA}" "${FRONTEND_REPO}:latest"

      - name: Perform rolling deployment
        env:
          API_IMAGE_SHA: ${{ env.API_REPO }}:${{ github.sha }}
          API_IMAGE_LATEST: ${{ env.API_REPO }}:latest
          WORKER_IMAGE_SHA: ${{ env.WORKER_REPO }}:${{ github.sha }}
          WORKER_IMAGE_LATEST: ${{ env.WORKER_REPO }}:latest
          FRONTEND_IMAGE_SHA: ${{ env.FRONTEND_REPO }}:${{ github.sha }}
          FRONTEND_IMAGE_LATEST: ${{ env.FRONTEND_REPO }}:latest
          REDIS_IMAGE: redis:7-alpine
          REDIS_APPENDONLY: "yes"
          REDIS_PASSWORD: deploy-password
          JOB_QUEUE: jobs
          API_REDIS_PORT: "6379"
          WORKER_REDIS_PORT: "6379"
          WORKER_POLL_TIMEOUT: "1"
          WORKER_JOB_DURATION_SECONDS: "1"
          FRONTEND_CONTAINER_PORT: "3000"
          FRONTEND_HOST: "0.0.0.0"
          HEALTH_TIMEOUT_SECONDS: "60"
        run: bash scripts/rolling_update.sh
